<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 🌸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeaf4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #fff0f5;
    padding: 20px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
}

/* Image */
.container img {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 10px;
}

/* Title */
h1 {
    color: #ff69b4;
    margin: 10px 0;
}

/* Text */
p {
    font-size: 14px;
    color: #555;
}

/* Button */
button {
    background: #ff85a2;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
    color: white;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff5c8a;
}

/* Hidden message */
.hidden {
    display: none;
    margin-top: 10px;
    font-size: 14px;
}

/* Hearts floating */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Gallery */
.gallery img {
    width: 70px;
    border-radius: 10px;
    margin: 5px;
}

/* Footer */
footer {
    margin-top: 10px;
    font-size: 12px;
    color: #999;
}
</style>
</head>

<body>

<div class="container">

    <!-- MAIN PHOTO -->
    <img src="pic1.jpg" alt="My Love">

    <h1>Hi Baby 🌸</h1>

    <p>
        Ikaw yung pinaka maganda kong nangyari 💖  
        Thank you for loving me kahit makulit ako minsan 🥺
    </p>

    <!-- BUTTON -->
    <button onclick="showLove()">Click me 💕</button>

    <!-- SECRET MESSAGE -->
    <div id="message" class="hidden">
        I love you so much ❤️  
        Ikaw at ikaw pa rin pipiliin ko araw-araw 💖
    </div>

    <!-- GALLERY -->
    <div class="gallery">
        <img src="pic1.jpg">
        <img src="pic2.jpg">
        <img src="pic3.jpg">
    </div>

    <!-- MUSIC BUTTON -->
    <button onclick="playMusic()">Play Music 🎵</button>

    <audio id="bgmusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <footer>Made with love 💌</footer>

</div>

<script>
function showLove() {
    document.getElementById("message").style.display = "block";

    for (let i = 0; i < 10; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }
}

function playMusic() {
    document.getElementById("bgmusic").play();
}
</script>

</body>
</html>
