<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            color: #ff4b5c;
        }

        p {
            color: #444;
            font-size: 15px;
        }

        .heart {
            font-size: 28px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Replace with your actual image -->
        <img src="your-photo.jpg" alt="My Love">

        <h1>Hi Baby ❤️</h1>

        <p>
            Thank you for being part of my life.  
            Kahit minsan makulit ako, ikaw pa rin yung pipiliin ko araw-araw.
        </p>

        <p>
            I promise to love you, respect you, and make you smile kahit bad day ka 😊
        </p>

        <div class="heart">❤️</div>

        <footer>Made with love by Me 💌</footer>
    </div>

</body>
</html>
