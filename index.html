<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My  ❤️</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Screen */
#lockScreen {
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
}

/* Main Card */
.container {
    display: none;
    width: 90%;
    max-width: 350px;
    background: #1c1c1e;
    border-radius: 25px;
    padding: 20px;
    text-align: center;
}

/* Slideshow */
.slideshow img {
    width: 100%;
    border-radius: 20px;
}

/* Typing text */
#typing {
    font-size: 14px;
    margin-top: 10px;
    color: #ccc;
}

/* Days counter */
.counter {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
}
</style>

</head>
<body>

<!-- PASSWORD LOCK -->
<div id="lockScreen">
    <h2>Enter Password 💖</h2>
    <input type="password" id="pass">
    <br><br>
    <button onclick="unlock()">Open</button>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

    <!-- MUSIC -->
    <audio autoplay loop>
        <!-- Replace with your music file -->
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- SLIDESHOW -->
    <div class="slideshow">
        <img id="slide" src="my_picure.png">
    </div>

    <h2>Hi Baby ❤️</h2>

    <!-- TYPING MESSAGE -->
    <div id="typing"></div>

    <!-- DAYS COUNTER -->
    <div class="counter" id="days"></div>

</div>
<script>
// PASSWORD
function unlock() {
    let password = document.getElementById("pass").value;

    if (password === "013019") { // CHANGE PASSWORD HERE
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        startTyping();
        startDays();
    } else {
        alert("Wrong password 😢");
    }
}

// SLIDESHOW
let images = ["pic1.jpg", "pic2.jpg", "pic3.jpg"];
let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
}, 3000);

// TYPING EFFECT
let text = "I love you so much ❤️ Thank you for staying kahit mahirap ako mahalin minsan 🥺";
let i = 0;

function startTyping() {
    let speed = 50;
    function type() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// DAYS COUNTER
function startDays() {
    let startDate = new Date("2023-01-01"); // CHANGE THIS DATE
    let today = new Date();

    let diff = today - startDate;
    let days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("days").innerHTML =
        "We've been together for " + days + " days ❤️";
}
</script>
</body>
</html>
