<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 🌸</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff5f8);
    overflow: hidden;
}

/* Floating petals */
.petal {
    position: fixed;
    top: -10px;
    font-size: 18px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}

/* Card */
.container {
    position: relative;
    z-index: 2;
    width: 320px;
    margin: 80px auto;
    background: #fff0f5;
    padding: 20px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(255,105,180,0.3);
}

/* Image */
.container img {
    width: 100%;
    border-radius: 20px;
}

/* Title */
h1 {
    color: #ff69b4;
}

/* Chat bubble */
.bubble {
    background: #ff85a2;
    color: white;
    padding: 10px;
    border-radius: 15px;
    margin-top: 10px;
    text-align: left;
    font-size: 14px;
}

/* Counter */
.counter {
    margin-top: 10px;
    font-size: 13px;
    color: #777;
}

/* Button */
button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
}

/* Fade animation */
.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="container fade">

    <!-- IMAGE -->
    <img src="pic1.jpg">

    <h1>Hi Baby 🌸</h1>

    <!-- CHAT STYLE MESSAGE -->
    <div class="bubble">
        Good morning baby 💖  
        Just a reminder na ikaw yung pinaka favorite kong tao 🥺
    </div>

    <div class="bubble" style="background:#ffc1d3; color:#333;">
        Thank you for staying kahit minsan makulit ako 😭❤️
    </div>

    <!-- DAYS COUNTER -->
    <div class="counter" id="days"></div>

    <!-- MUSIC -->
    <button onclick="playMusic()">Play Music 🎵</button>

    <audio id="bgmusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
/* PETALS */
function createPetal() {
    let petal = document.createElement("div");
    petal.innerHTML = "🌸";
    petal.classList.add("petal");

    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 8000);
}

setInterval(createPetal, 300);

/* DAYS COUNTER */
let startDate = new Date("2023-01-01"); // CHANGE THIS
let today = new Date();
let diff = today - startDate;
let days = Math.floor(diff / (1000 * 60 * 60 * 24));

document.getElementById("days").innerHTML =
    "Together for " + days + " days 💖";

/* MUSIC */
function playMusic() {
    document.getElementById("bgmusic").play();
}
</script>

</body>
</html>
